name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-checks:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Check for build errors
        run: npm run build
        continue-on-error: true
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Validate configuration files
        run: |
          echo "✓ Checking next.config.mjs..."
          node -c next.config.mjs
          echo "✓ Checking tsconfig.json..."
          node -e "const config = require('./tsconfig.json'); console.log('✓ tsconfig.json is valid JSON')"

  backend-checks:
    name: Backend Python Checks
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Check requirements.txt exists
        run: |
          if [ ! -f backend/requirements.txt ]; then
            echo "❌ Error: backend/requirements.txt not found"
            exit 1
          fi
          echo "✓ requirements.txt found"
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
        working-directory: backend
        continue-on-error: false
      
      - name: Validate Python syntax
        run: |
          for file in $(find backend -name "*.py" -type f); do
            python -m py_compile "$file" || exit 1
          done
          echo "✓ All Python files have valid syntax"
      
      - name: Check for required modules
        run: |
          python -c "
          required_modules = ['fastapi', 'uvicorn', 'pydantic', 'asyncpg']
          for module in required_modules:
              try:
                  __import__(module)
                  print(f'✓ {module} is installed')
              except ImportError:
                  print(f'❌ {module} is NOT installed')
                  exit(1)
          "
      
      - name: Create test environment file
        run: |
          cat > backend/.env.test << EOF
          ENVIRONMENT=test
          API_HOST=0.0.0.0
          API_PORT=8000
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=testuser
          DB_PASSWORD=testpass
          DB_NAME=testdb
          CORS_ORIGINS=http://localhost:3000,https://hackthon-demo-ten.vercel.app
          GEMINI_API_KEY=test-key
          JWT_SECRET_KEY=test-secret-key
          EOF
      
      - name: Start FastAPI server in background
        run: |
          cd backend
          export $(cat .env.test | xargs)
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/fastapi.pid
          echo "Waiting for API to start..."
          sleep 10
      
      - name: Check API is running on correct port
        run: |
          echo "Checking if API is running on port 8000..."
          if nc -z localhost 8000; then
            echo "✓ API is listening on port 8000"
          else
            echo "❌ API is not running on port 8000"
            exit 1
          fi
      
      - name: Test health endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" http://localhost:8000/health)
          status_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n1)
          
          if [ "$status_code" = "200" ]; then
            echo "✓ Health endpoint returns 200"
            echo "Response: $body"
          else
            echo "❌ Health endpoint returned $status_code"
            exit 1
          fi
      
      - name: Test CORS headers
        run: |
          response=$(curl -s -I -H "Origin: https://hackthon-demo-ten.vercel.app" http://localhost:8000/health)
          
          if echo "$response" | grep -q "access-control-allow-origin: https://hackthon-demo-ten.vercel.app"; then
            echo "✓ CORS headers are correct"
          else
            echo "❌ CORS headers missing or incorrect"
            echo "$response"
            exit 1
          fi
      
      - name: Test API endpoints structure
        run: |
          # Test root endpoint
          root_response=$(curl -s http://localhost:8000/)
          if echo "$root_response" | grep -q "message"; then
            echo "✓ Root endpoint working"
          else
            echo "❌ Root endpoint failed"
            exit 1
          fi
          
          # Test connection-status endpoint
          status_response=$(curl -s -w "\n%{http_code}" http://localhost:8000/api/connection-status)
          if echo "$status_response" | tail -n1 | grep -q "200"; then
            echo "✓ Connection status endpoint accessible"
          else
            echo "⚠️  Connection status endpoint returned non-200 (expected without DB)"
          fi
      
      - name: Stop FastAPI server
        if: always()
        run: |
          if [ -f /tmp/fastapi.pid ]; then
            kill $(cat /tmp/fastapi.pid) || true
          fi

  dependency-check:
    name: Dependency Validation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate package.json
        run: |
          if [ ! -f package.json ]; then
            echo "❌ Error: package.json not found"
            exit 1
          fi
          node -e "const pkg = require('./package.json'); console.log('✓ package.json is valid JSON'); console.log('Project:', pkg.name, 'v' + pkg.version)"
      
      - name: Check for duplicate dependencies
        run: |
          node -e "
          const pkg = require('./package.json');
          const deps = Object.keys(pkg.dependencies || {});
          const devDeps = Object.keys(pkg.devDependencies || {});
          const duplicates = deps.filter(d => devDeps.includes(d));
          if (duplicates.length > 0) {
            console.log('⚠️  Warning: Packages in both dependencies and devDependencies:', duplicates);
          } else {
            console.log('✓ No duplicate dependencies found');
          }
          "
      
      - name: Check backend requirements.txt format
        run: |
          echo "Validating requirements.txt format..."
          if grep -E '^[a-zA-Z0-9_-]+==.*$' backend/requirements.txt > /dev/null; then
            echo "✓ requirements.txt uses pinned versions"
          else
            echo "⚠️  Warning: Some packages in requirements.txt are not pinned to specific versions"
          fi

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for hardcoded secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          
          # Check for actual secret patterns (not variable names or UI text)
          secret_patterns=(
            'sk-[a-zA-Z0-9]{32,}'          # OpenAI-style keys
            'AIza[a-zA-Z0-9_-]{35}'        # Google API keys
            '[0-9a-f]{32,64}'              # Generic hex keys
            'ghp_[a-zA-Z0-9]{36}'          # GitHub personal tokens
            'postgres://[^@]*:[^@]*@'      # DB connection strings with credentials
            'mysql://[^@]*:[^@]*@'         # MySQL connection strings
          )
          
          found_secrets=false
          for pattern in "${secret_patterns[@]}"; do
            if grep -rE "$pattern" app/ backend/ --include="*.ts" --include="*.tsx" --include="*.py" 2>/dev/null | grep -v "node_modules\|\.next\|__pycache__"; then
              echo "⚠️  Potential secret pattern found: $pattern"
              found_secrets=true
            fi
          done
          
          if [ "$found_secrets" = true ]; then
            echo "❌ Hardcoded secrets detected!"
            exit 1
          else
            echo "✓ No hardcoded secrets found"
          fi
      
      - name: Check for .env files in git
        run: |
          committed_env_files=$(git ls-files | grep -E "^\.env$|\.env\.local$|\.env\.production$" || true)
          
          if [ -n "$committed_env_files" ]; then
            echo "❌ Error: .env files should not be committed:"
            echo "$committed_env_files"
            exit 1
          fi
          echo "✓ No .env files committed (example files are OK)"

  notify:
    name: Notify on Status
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks, dependency-check, security-checks]
    if: always()
    
    steps:
      - name: Check if all jobs passed
        run: |
          if [ "${{ needs.frontend-checks.result }}" = "failure" ] || \
             [ "${{ needs.backend-checks.result }}" = "failure" ] || \
             [ "${{ needs.dependency-check.result }}" = "failure" ] || \
             [ "${{ needs.security-checks.result }}" = "failure" ]; then
            echo "❌ Some checks failed - see logs for details"
            exit 1
          else
            echo "✅ All checks passed!"
          fi

  production-api-test:
    name: Test Production API
    runs-on: ubuntu-latest
    needs: [backend-checks]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install test dependencies
        run: |
          pip install httpx
      
      - name: Test production API endpoints
        run: |
          cd backend
          API_URL="https://api.amitdevx.tech" python3 test_integration.py
        continue-on-error: true
      
      - name: Summary
        run: |
          echo "✓ Production API test completed"
          echo "Note: This test may fail if API server is not running on Azure VM"
